apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: robot-shop-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prom
    role: alert-rules
spec:
  groups:
    - name: robot-shop.http
      interval: 15s
      rules:
        - alert: Http500Spike
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="robot-shop",
                pod=~"catalogue-.*"
              }[5m]
            ) > 0
          for: 30s
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Catalogue pod restarted - triggering self-heal"
            description: "Catalogue has restarted. Webhook will re-apply clean state."

        - alert: DispatchQueueBacklog
          expr: |
            kube_deployment_spec_replicas{
              namespace="robot-shop",
              deployment="dispatch"
            } >= 5
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Dispatch scaling up - queue pressure detected"
